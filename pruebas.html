<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #f4f6f9;
        margin: 0;
        padding: 20px;
        color: #333;
      }

      .container {
        background-color: #fff;
        border-radius: 8px;
        max-width: 650px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        overflow: hidden;
      }

      .header {
        background-color: #e63743;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
      }

      .sub-header {
        text-align: center;
        padding: 10px;
        font-size: 14px;
        background-color: #ffe9e9;
        color: #e63743;
      }

      .section {
        padding: 20px;
      }

      .footer {
        text-align: center;
        font-size: 12px;
        color: #888;
        padding: 15px 20px;
        border-top: 1px solid #eee;
        background-color: #fafafa;
      }
    </style>
  </head>

  <body>
    <div style="text-align: center; padding: 20px 0">
      <img
        src="https://pavastecnologia.com/lamayoristanew/images/logos/lamayoristanew.png"
        alt="La Mayorista"
        style="max-height: 60px"
      />
    </div>
    <div class="container">
      <div class="sub-header">${title}</div>

      <div class="section">${body}</div>
    </div>
    <!-- Footer -->
    <div style="padding-top: 20px; margin-top: 30px">
      <p
        style="
          font-size: 11px;
          color: #999;
          margin: 5px 0 0 0;
          text-align: center;
        "
      >
        Este es un mensaje automático del Sistema de Gestión de tickets - La Mayorista.<br />
        Si cree que ha recibido este mensaje por error, contacte a
        <a href="mailto:soporte@pavas.co" style="color: #e63743"
          >soporte@pavas.co</a
        >
      </p>
      <p
        style="
          font-size: 11px;
          color: #e63743;
          margin: 5px 0 0 0;
          text-align: center;
          font-weight: bold;
        "
      >
        © PAVAS SAS - La Mayorista
      </p>
      <div style="text-align: center; padding: 20px 0">
        <img
          src="https://pavastecnologia.com/stayconnected/img/logoPavasStay.png"
          alt="La Mayorista"
          style="max-height: 30px"
        />
      </div>
    </div>
  </body>
</html>
